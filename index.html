<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 和 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 引入 Babel 用于浏览器内编译 JSX -->

  <!-- 引入 Framer Motion 用于高级动画 -->
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <style>
    body { margin: 0; background-color: #050505; color: #f4f4f5; overflow-x: hidden; cursor: none; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif; }

    /* 自定义滚动条 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #050505; }
    ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #dc2626; }
    
    /* 选中文字颜色 */
    ::selection { background-color: #dc2626; color: white; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useRef } = React;
    const { motion, useScroll, useTransform, useSpring, AnimatePresence } = window.Motion;

    // --- Gemini API 设置 ---
    // 💡 提示：由于你部署到了 GitHub，这里需要填入你申请的真实 Google Gemini API Key，AI 解析按钮才会生效哦！
    const apiKey = "";

    // --- 图标组件 (替代 lucide-react 以适配纯 HTML) ---

      </svg>

    const Diamond = ({ size = 24, className = "", strokeWidth = 2 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLineJoin="round" className={className}>

      </svg>
    );
    const X = ({ size = 24, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={className}>
        <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
      </svg>
    );
    const Loader2 = ({ size = 24, className = "" }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLineJoin="round" className={`animate-spin ${className}`}>
        <path d="M21 12a9 9 0 1 1-6.219-8.56"/>

    // --- 终极作品集数据 ---
    const PORTFOLIO_DATA = {
      posters: [
        { id: 1, title: "URBAN NOMAD", subtitle: "Surreal Metropolis Collage", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/PORTFOLIO%20banner%201.png" },
        { id: 2, title: "DISCO FEVER", subtitle: "Retro Typography & Vinyl", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/PORTFOLIO%20banner%202.png" },
        { id: 3, title: "FLORAL ILLUSION", subtitle: "Nature Meets Digital", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/PORTFOLIO%20banner%203.png" },
        { id: 4, title: "70S AESTHETIC", subtitle: "Classic Layout", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/PORTFOLIO%20banner%204.png" },
        { id: 5, title: "CHERRY BOMB", subtitle: "Surreal Collage", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/PORTFOLIO%20banner%205.jpeg" }
      ],
      culturalIP: [
        { id: 11, title: "龙与水榭插画", desc: "重构东方建筑与神话元素的平铺视觉。", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/IMG_4039.JPG", colSpan: "col-span-12" },
        { id: 12, title: "圆明园丝巾佩戴", desc: "文化IP织物的成衣佩戴视觉，色彩饱满。", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/IMG_4032.JPG", colSpan: "col-span-12 md:col-span-7" },
        { id: 13, title: "节气礼盒包装", desc: "极简高级的实体包装盒落地设计。", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/IMG_4025.JPG", colSpan: "col-span-12 md:col-span-5" },
        { id: 14, title: "丝巾实物静物", desc: "黄调丝织品质感与银色蝴蝶的视觉碰撞。", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/IMG_4033.JPG", colSpan: "col-span-12 md:col-span-4" },
        { id: 15, title: "柿柿如意插画", desc: "秋日氛围的童趣与传统元素结合。", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/IMG_4037.JPG", colSpan: "col-span-12 md:col-span-8" },
        { id: 16, title: "白虎枯山水", desc: "清冷色调的东方庭院想象。", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/IMG_4038.JPG", colSpan: "col-span-12 md:col-span-6" },
        { id: 17, title: "东方植物徽章", desc: "提取东方植物意象的金属徽章设计。", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/IMG_4028.JPG", colSpan: "col-span-12 md:col-span-6" },
        { id: 18, title: "节气礼文创视觉", desc: "系统性包装与色彩排版规划。", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/IMG_4041.JPG", colSpan: "col-span-12 md:col-span-4" },
        { id: 19, title: "丝巾实物展开", desc: "完整织物图案与边缘处理呈现。", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/IMG_4035.JPG", colSpan: "col-span-12 md:col-span-4" },
        { id: 20, title: "书签与修长包装", desc: "精致的修长比例礼盒与书签排版。", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/IMG_4027.JPG", colSpan: "col-span-12 md:col-span-4" }
      ],
      jewelry: [
        { id: 31, title: "Sapphire Blossom", desc: "蓝宝石花卉戒指。极致展现花瓣的渐变层次与钻石火彩。", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/IMG_4009.JPG" },
        { id: 32, title: "Diamond River", desc: "经典流线型钻石项链手绘。线条流畅体现铂金与钻石的交织。", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/IMG_4011.JPG" },
        { id: 33, title: "Royal Sapphire Cuff", desc: "蓝宝石镂空手镯手绘。复古镂空工艺与主石镶嵌的完美融合。", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/IMG_4012.JPG" },
        { id: 34, title: "Emerald Radial", desc: "放射状结构祖母绿戒指。展现极具视觉冲击的几何张力。", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/IMG_4013.JPG" },
        { id: 35, title: "Star Sapphire Ring", desc: "星光蓝宝石主石，搭配花瓣状的碎钻镶嵌光环。", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/IMG_4014.JPG" },
        { id: 36, title: "Rose Gold Radiant", desc: "玫瑰金放射状戒指手绘。金属光泽与钻石刻面交相辉映。", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/IMG_4015.JPG" },
        { id: 37, title: "Emerald Heritage", desc: "经典祖母绿切割戒指。精准捕捉祖母绿的深邃光影与刻面细节。", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/IMG_4017.JPG" },
        { id: 38, title: "Emerald Halo Ring", desc: "圆形光环包镶祖母绿戒指。彰显严谨的工匠级手绘功底。", src: "https://raw.githubusercontent.com/Sylus00100/portfolio-video111/main/IMG_4018.JPG" }
      ]
    };

    // --- 自定义跟随鼠标 ---
    const CustomCursor = () => {
      const [mousePosition, setMousePosition] = useState({ x: 0, y: 0 });
      const [isHovering, setIsHovering] = useState(false);

      useEffect(() => {
        const updateMousePosition = (e) => setMousePosition({ x: e.clientX, y: e.clientY });
        const handleMouseOver = (e) => {
          if (e.target.closest('.hover-trigger') || e.target.closest('button')) setIsHovering(true);
          else setIsHovering(false);
        };
        window.addEventListener('mousemove', updateMousePosition);
        window.addEventListener('mouseover', handleMouseOver);
        return () => {
          window.removeEventListener('mousemove', updateMousePosition);
          window.removeEventListener('mouseover', handleMouseOver);
        };
      }, []);

      return (
        <motion.div
          className="fixed top-0 left-0 bg-white rounded-full pointer-events-none z-[999] mix-blend-difference hidden md:block"
          animate={{ x: mousePosition.x - (isHovering ? 40 : 10), y: mousePosition.y - (isHovering ? 40 : 10), width: isHovering ? 80 : 20, height: isHovering ? 80 : 20 }}
          transition={{ type: "spring", stiffness: 500, damping: 28, mass: 0.5 }}
        >
          <AnimatePresence>
            {isHovering && (
              <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="w-full h-full flex items-center justify-center text-black font-bold text-[10px] mix-blend-normal uppercase tracking-widest">
                Explore
              </motion.div>
            )}
          </AnimatePresence>
        </motion.div>
      );
    };

    // --- 横向滚动区域 ---
    const HorizontalScrollSection = () => {
      const targetRef = useRef(null);
      const { scrollYProgress } = useScroll({ target: targetRef });
      const x = useTransform(scrollYProgress, [0, 1], ["5%", "-85%"]);
      const textX = useTransform(scrollYProgress, [0, 1], ["0%", "15%"]);

      return (
        <section ref={targetRef} className="relative h-[500vh] bg-[#050505]">
          <div className="sticky top-0 h-screen flex items-center overflow-hidden">
            <motion.div style={{ x: textX }} className="absolute whitespace-nowrap opacity-[0.03] z-0 pointer-events-none">
              <h2 className="text-[25vw] font-black uppercase italic tracking-tighter">RETRO DISCO AI LAB RETRO DISCO</h2>
            </motion.div>
            <motion.div style={{ x }} className="flex gap-12 md:gap-24 px-[5vw] z-10">
              {PORTFOLIO_DATA.posters.map((poster) => (
                <div key={poster.id} className="relative group w-[85vw] md:w-[50vw] h-[65vh] shrink-0 hover-trigger">
                  <div className="w-full h-full overflow-hidden rounded-sm bg-zinc-900 border border-zinc-900 shadow-2xl">
                    <motion.img src={poster.src} alt={poster.title} className="w-full h-full object-cover grayscale brightness-[0.4] group-hover:grayscale-0 group-hover:brightness-100 group-hover:scale-[1.05] transition-all duration-700 ease-out" />
                    <div className="absolute inset-0 bg-red-600/0 group-hover:bg-red-600/10 mix-blend-overlay transition-colors duration-500" />
                  </div>
                  <div className="absolute -bottom-10 left-0 md:-left-8 mix-blend-difference pointer-events-none z-20">
                    <h3 className="text-5xl md:text-7xl font-black text-white uppercase leading-none tracking-tighter">{poster.title}</h3>
                    <p className="text-zinc-300 italic font-serif mt-2 text-lg">{poster.subtitle}</p>
                  </div>
                </div>
              ))}
            </motion.div>
          </div>
        </section>
      );
    };

    // --- 跑马灯 ---
    const Marquee = ({ text, reverse }) => (
      <div className="relative flex overflow-x-hidden w-full py-5 bg-zinc-900 border-y border-zinc-800 -rotate-2 scale-105 z-20 shadow-2xl shadow-black">
        <div className={`flex whitespace-nowrap animate-marquee ${reverse ? 'flex-row-reverse' : ''}`} style={{animation: `marquee 35s linear infinite ${reverse ? 'reverse' : 'normal'}`}}>
          {[...Array(4)].map((_, i) => (
            <span key={i} className="text-zinc-500 hover:text-white transition-colors duration-500 text-2xl md:text-4xl font-bold uppercase tracking-widest px-12 flex items-center">
              {text} <Sparkles className="inline ml-8 text-red-600" size={28}/>
            </span>
          ))}
        </div>
        <style>{`@keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }`}</style>
      </div>
    );

    function App() {
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [selectedProject, setSelectedProject] = useState(null);
      const [aiAnalysis, setAiAnalysis] = useState("");
      const [isGenerating, setIsGenerating] = useState(false);
      const { scrollYProgress } = useScroll();
      const opacityHero = useTransform(scrollYProgress, [0, 0.15], [1, 0]);
      const yHero = useTransform(scrollYProgress, [0, 0.2], [0, -100]);

      const fetchAIAnalysis = async (project) => {
        if(!apiKey) {
            setAiAnalysis("您需要在此代码的第41行填入您的真实 Gemini API 密钥才能使用 AI 策展人功能哦。");
            setSelectedProject(project);
            setIsModalOpen(true);
            return;
        }

        setSelectedProject(project);
        setIsModalOpen(true);
        setIsGenerating(true);
        setAiAnalysis("");
        try {
          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ parts: [{ text: `你是一位顶尖艺术评论家。为设计师林子熙的作品《${project.title}》写150字左右的先锋感设计赏析。作品描述：${project.desc}。语气要高级、时尚。` }] }] })
            }
          );
          const data = await response.json();
          setAiAnalysis(data.candidates?.[0]?.content?.parts?.[0]?.text || "解析生成失败。");
        } catch {
          setAiAnalysis("AI 灵感引擎暂时繁忙。");
        } finally {
          setIsGenerating(false);
        }
      };

      return (
        <div className="bg-[#050505] min-h-screen text-zinc-100 cursor-none overflow-x-hidden selection:bg-red-600 font-sans">
          <div className="fixed inset-0 pointer-events-none z-[90] opacity-[0.03] mix-blend-screen" style={{ backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E")` }}></div>
          <CustomCursor />

          {/* AI Curator Modal */}
          <AnimatePresence>
            {isModalOpen && (
              <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[500] flex items-center justify-center p-4 md:p-10">
                <div className="absolute inset-0 bg-black/80 backdrop-blur-md" onClick={() => setIsModalOpen(false)} />
                <motion.div initial={{ y: 50, scale: 0.95 }} animate={{ y: 0, scale: 1 }} className="relative bg-zinc-950 border border-zinc-800 p-8 md:p-12 w-full max-w-2xl shadow-[0_0_80px_rgba(220,38,38,0.15)] z-10">
                  <button onClick={() => setIsModalOpen(false)} className="absolute top-6 right-6 text-zinc-500 hover:text-white transition-colors"><X size={24} /></button>
                  <div className="flex items-center gap-3 mb-8 border-b border-zinc-800 pb-4"><Sparkles className="text-red-600" size={24} /><h3 className="text-xl font-bold uppercase tracking-widest text-zinc-300">AI Curator Review</h3></div>
                  <h4 className="text-3xl font-black mb-2 uppercase">{selectedProject?.title}</h4>
                  <div className="bg-[#0a0a0a] p-6 rounded-sm min-h-[160px] relative overflow-hidden border border-zinc-900">
                    {isGenerating ? <div className="absolute inset-0 flex flex-col items-center justify-center text-zinc-500 gap-4"><Loader2 className="text-red-600" size={36} /><span className="text-xs tracking-[0.2em] uppercase">Gemini 正在重构美学语言...</span></div> : <p className="text-zinc-300 leading-relaxed font-serif text-lg text-justify italic">{aiAnalysis}</p>}
                  </div>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>

          {/* Hero Section */}
          <motion.section style={{ opacity: opacityHero }} className="relative h-screen flex flex-col items-center justify-center px-6">
            <div className="absolute top-12 left-6 md:left-12 flex items-center gap-4 hover-trigger">
              <div className="w-14 h-14 rounded-full border border-zinc-800 bg-zinc-900 flex items-center justify-center text-[10px] font-bold text-zinc-500">ZI_XI</div>
              <span className="text-[10px] tracking-[0.2em] uppercase text-zinc-500 font-medium leading-relaxed">ZI_XI LIN <br/><span className="text-zinc-600 font-light">Fashion & Accessory Design</span></span>
            </div>
            <motion.div style={{ y: yHero }} className="text-center z-10 flex flex-col items-center mt-12">
              <div className="px-5 py-2 border border-zinc-800 rounded-full text-[10px] md:text-xs tracking-[0.3em] uppercase text-zinc-400 flex items-center gap-3 bg-black/50 backdrop-blur-sm mb-8">
                <span className="w-2 h-2 bg-red-600 rounded-full animate-pulse shadow-[0_0_10px_rgba(220,38,38,0.8)]"></span>Avant-Garde Designer Portfolio
              </div>
              <h1 className="text-[15vw] md:text-[11vw] leading-[0.8] font-black tracking-tighter uppercase flex flex-col items-center">
                <motion.span initial={{ y: 100, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ duration: 1 }}>林子熙</motion.span>
                <motion.span initial={{ y: 100, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ duration: 1, delay: 0.2 }} className="text-red-600 italic font-serif mt-2">Creative</motion.span>
                <motion.span initial={{ y: 100, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ duration: 1, delay: 0.4 }} className="mt-2">Visionary.</motion.span>
              </h1>
              <p className="mt-12 text-zinc-400 max-w-2xl text-center text-xs md:text-sm font-light leading-relaxed tracking-widest">
                大连工业大学 服装与服饰设计科班出身。通过 AI 赋能颠覆传统创作流，<br className="hidden md:block"/>将东方意象与现代美学转译为极具视觉张力的高定手绘与商业落地产品。
              </p>
            </motion.div>
            <div className="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-4 text-zinc-600 text-[10px] tracking-[0.3em] uppercase">Scroll<div className="w-[1px] h-16 bg-gradient-to-b from-zinc-500 to-transparent"></div></div>
          </motion.section>

          <Marquee text="2024 设计马拉松金奖 · 万科活动策划 · AI 灵感提效 · 视觉生成 · 逻辑梳理" reverse={false} />

          <HorizontalScrollSection />

          {/* Cultural IP Bento Grid */}
          <section className="py-32 md:py-48 px-6 md:px-12 lg:px-24 bg-zinc-950">
            <div className="mb-24 border-b border-zinc-800 pb-12">
              <h2 className="text-5xl md:text-8xl font-black uppercase tracking-tighter mb-4 leading-none text-white">Cultural IP <br/><span className="text-zinc-600 font-serif italic font-light">& Textile.</span></h2>
              <p className="text-zinc-400 max-w-xl font-light text-lg mt-6">将传统插画与东方神话，转化为高品质丝巾织物与文创包装，兼顾审美张力与商业落地。</p>
            </div>
            <div className="grid grid-cols-12 gap-4 md:gap-6 auto-rows-[300px] md:auto-rows-[400px]">
              {PORTFOLIO_DATA.culturalIP.map((item) => (
                <motion.div initial={{ opacity: 0, y: 50 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true }} key={item.id} className={`${item.colSpan} relative group hover-trigger overflow-hidden bg-zinc-900 border border-zinc-800`}>
                  <img src={item.src} alt={item.title} className="w-full h-full object-cover opacity-50 grayscale group-hover:opacity-100 group-hover:grayscale-0 group-hover:scale-[1.02] transition-all duration-700" />
                  <div className="absolute inset-0 p-6 md:p-10 flex flex-col justify-end bg-gradient-to-t from-black via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-all duration-500">
                    <h3 className="text-2xl md:text-3xl font-bold mb-4 uppercase tracking-tighter">{item.title}</h3>
                    <button onClick={() => fetchAIAnalysis(item)} className="flex items-center gap-2 w-fit px-4 py-2 bg-red-600 text-white text-[10px] uppercase tracking-[0.2em] font-bold rounded-sm transition-colors shadow-lg z-20 relative"><Sparkles size={14} /> AI Analysis</button>
                  </div>
                </motion.div>
              ))}
            </div>
